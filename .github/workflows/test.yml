name: Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    name: Lint (ShellCheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          # Scan everything by default (finds .sh and sh/bash shebangs)
          severity: warning
  
  test:
    name: Integration Test (Mock)
    runs-on: ubuntu-latest
    services:
      altertable:
        image: ghcr.io/altertable-ai/altertable-mock:latest
        ports:
          - 15000:15000
        env:
          ALTERTABLE_MOCK_USERS: testuser:testpass
        options: >-
          --health-cmd "exit 0"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 3
          --health-start-period 10s

    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: sudo apt-get install -y curl jq

      - name: Verify executable
        run: |
          chmod +x bin/altertable
          ./bin/altertable --version
          ./bin/altertable --help

      - name: Run Integration Tests
        run: ./tests/integration_test.sh
